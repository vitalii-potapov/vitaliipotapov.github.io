<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватная Голосовая Связь</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 320px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: #4CAF50; color: white; }
        .btn-call { background: #2196F3; color: white; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
        .online { color: #4CAF50 !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔒 Voice Chat</h2>
    <p>Введите общий пароль:</p>
    <input type="password" id="password" placeholder="Ваш секретный код">
    
    <button id="start-btn" class="btn-start">1. Создать линию</button>
    <button id="call-btn" class="btn-call" disabled>2. Позвонить другу</button>

    <div id="status">Статус: Ожидание...</div>
    
    <audio id="remote-audio" autoplay></audio>
</div>

<script>
    let peer = null;
    let localStream = null;
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');
    const callBtn = document.getElementById('call-btn');
    const passwordInput = document.getElementById('password');
    const remoteAudio = document.getElementById('remote-audio');

    // Хэшируем пароль немного, чтобы ID был сложнее (соль)
    const getPeerId = (pass) => "vchat_room_" + btoa(pass).substring(0, 12);

    // 1. Инициализация связи
    startBtn.onclick = async () => {
        const pass = passwordInput.value;
        if (!pass) return alert("Введите пароль!");

        try {
            // Запрашиваем доступ к микрофону
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Создаем подключение с ID на основе пароля
            peer = new Peer(getPeerId(pass));

            peer.on('open', (id) => {
                statusEl.innerText = "Линия готова. Скажите другу этот же пароль.";
                statusEl.classList.add('online');
                startBtn.disabled = true;
                callBtn.disabled = false;
            });

            // Обработка входящего звонка
            peer.on('call', (call) => {
                statusEl.innerText = "Входящий звонок...";
                call.answer(localStream); // Отвечаем своим голосом
                call.on('stream', (stream) => {
                    remoteAudio.srcObject = stream; // Слушаем друга
                    statusEl.innerText = "В связи (разговор)";
                });
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') {
                    alert("Эта линия уже занята! Попробуйте другой пароль.");
                } else {
                    console.error(err);
                    statusEl.innerText = "Ошибка: " + err.type;
                }
            });

        } catch (err) {
            alert("Нужен доступ к микрофону!");
        }
    };

    // 2. Функция звонка другу
    callBtn.onclick = () => {
        const pass = passwordInput.value;
        const friendId = getPeerId(pass);
        
        statusEl.innerText = "Вызываем...";
        const call = peer.call(friendId, localStream);

        call.on('stream', (stream) => {
            remoteAudio.srcObject = stream;
            statusEl.innerText = "В связи (разговор)";
        });

        call.on('error', (err) => {
            statusEl.innerText = "Не удалось дозвониться.";
        });
    };
</script>

</body>
</html>
