<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Tunnel v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 1rem; }
        .controls { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-host { background: #4CAF50; color: white; }
        .btn-call { background: #2196F3; color: white; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #aaa; min-height: 40px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔒 Voice Tunnel 3</h2>
    <input type="password" id="password" placeholder="Секретный пароль">
    
    <div class="controls">
        <button id="host-btn" class="btn-host">Я жду звонка</button>
        <button id="call-btn" class="btn-call">Я звоню другу</button>
    </div>

    <div id="status">Готов к работе</div>
    <audio id="remote-audio" autoplay playsinline></audio>
</div>

<script>
    const statusEl = document.getElementById('status');
    const passwordInput = document.getElementById('password');
    const remoteAudio = document.getElementById('remote-audio');
    let localStream = null;
    let peer = null;

    const log = (msg) => {
        console.log(msg);
        statusEl.innerText = msg;
    };

    const getPeerId = (pass) => "vchat_" + btoa(pass).substring(0, 16);

    // Функция разблокировки аудио (вызывается ПЕРВОЙ при клике)
    function unlockAudio() {
        remoteAudio.play().catch(() => { /* игнорируем, это просто прогрев */ });
        remoteAudio.pause();
    }

    async function startMedia() {
        if (localStream) return true;
        log("Запрашиваю микрофон...");
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                } 
            });
            log("Микрофон получен ✅");
            return true;
        } catch (err) {
            log("Ошибка микрофона: " + err.message);
            return false;
        }
    }

    // ЛОГИКА ХОСТА
    document.getElementById('host-btn').onclick = async () => {
        const pass = passwordInput.value;
        if (!pass) return alert("Нужен пароль");
        
        unlockAudio();
        const ok = await startMedia();
        if (!ok) return;

        log("Регистрация в сети...");
        if(peer) peer.destroy();
        peer = new Peer(getPeerId(pass));

        peer.on('open', () => log("Линия открыта. Друг может звонить."));
        
        peer.on('call', (call) => {
            log("Входящий! Соединяю...");
            call.answer(localStream);
            call.on('stream', (stream) => {
                log("Разговор в эфире 🎙️");
                remoteAudio.srcObject = stream;
                remoteAudio.play();
            });
        });

        peer.on('error', (err) => log("Ошибка: " + err.type));
    };

    // ЛОГИКА ГОСТЯ
    document.getElementById('call-btn').onclick = async () => {
        const pass = passwordInput.value;
        if (!pass) return alert("Нужен пароль");

        unlockAudio();
        const ok = await startMedia();
        if (!ok) return;

        log("Подготовка к вызову...");
        if(peer) peer.destroy();
        peer = new Peer(); // Гость получает случайный ID

        peer.on('open', () => {
            log("Вызываю друга...");
            const call = peer.call(getPeerId(pass), localStream);
            
            call.on('stream', (stream) => {
                log("Разговор в эфире 🎙️");
                remoteAudio.srcObject = stream;
                remoteAudio.play();
            });
            
            // Если через 5 секунд нет ответа
            setTimeout(() => {
                if (statusEl.innerText === "Вызываю друга...") {
                    log("Друг не в сети или не нажал 'Жду звонка'");
                }
            }, 7000);
        });

        peer.on('error', (err) => log("Ошибка: " + err.type));
    };
</script>

</body>
</html>
